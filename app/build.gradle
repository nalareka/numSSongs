plugins {
    id 'com.android.application'
}

android {
    namespace 'com.numssongs.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.numssongs.app"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "0.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
